spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.generate-unique-name=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false
resilience.max-retries=3
resilience.retry-delay=500ms
resilience.timeout-duration=2s
resilience.circuit-breaker-threshold=5
resilience.sliding-window-size=10
spring.threads.virtual.enabled=true
resilience.rate-limit-for-period=10
resilience.rate-limit-refresh-period=1s
resilience.wait-duration-in-open-state=10s
resilience.permitted-number-of-calls-in-half-open-state=3
resilience.rate-limit-timeout-duration = 0ms
management.endpoints.web.exposure.include=*
spring.jmx.enabled=true
simulator.failure-rate=30
simulator.slow-response-rate=20
